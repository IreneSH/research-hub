<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026年7月美伊衝突時間軸</title>
<style>
  :root {
    --bg: #10151c;
    --panel: #182029;
    --panel2: #1e2833;
    --line: #2b3844;
    --text: #eeeade;
    --muted: #b4c2ce;
    --sea: #1d5078;
    --sea-deep: #123048;
    --land: #2b3743;
    --land-line: #4a5d6e;
    --us: #e2544a;
    --iran: #e8a33d;
    --naval: #4da3d8;
    --brent: #6fd3a7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    display: flex;
    justify-content: center;
    padding: 24px 12px 48px;
  }
  .wrap { width: 100%; max-width: 860px; }
  header { margin-bottom: 18px; }
  .eyebrow {
    font-size: 12px; letter-spacing: 3px; color: var(--iran);
    text-transform: uppercase; margin-bottom: 6px;
  }
  h1 { font-size: 22px; font-weight: 600; letter-spacing: 1px; }
  h1 span { color: var(--muted); font-weight: 400; font-size: 15px; margin-left: 10px; }
  .mapbox {
    background: var(--sea-deep);
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
    position: relative;
  }
  svg { display: block; width: 100%; height: auto; }
  .legend {
    display: flex; gap: 18px; flex-wrap: wrap;
    padding: 10px 16px;
    background: var(--panel);
    border-top: 1px solid var(--line);
    font-size: 13.5px; color: var(--muted);
  }
  .legend b { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; vertical-align: -1px; }
  .controls {
    display: flex; align-items: center; gap: 10px;
    margin-top: 14px;
  }
  button {
    background: var(--panel2); color: var(--text);
    border: 1px solid var(--line); border-radius: 8px;
    min-width: 46px; height: 40px; font-size: 16px;
    cursor: pointer; transition: background .15s;
  }
  button:hover { background: #263341; }
  #play { min-width: 64px; background: #2a3d33; border-color: #3c5a49; }
  #play:hover { background: #32493d; }
  input[type=range] {
    flex: 1; accent-color: var(--iran); height: 4px; cursor: pointer;
  }
  .datelbl { font-size: 17px; font-weight: 600; min-width: 52px; text-align: right; font-variant-numeric: tabular-nums; }
  .info {
    display: grid; grid-template-columns: 1fr 150px; gap: 12px;
    margin-top: 12px;
  }
  @media (max-width: 560px) { .info { grid-template-columns: 1fr; } }
  .card {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 10px; padding: 14px 16px;
  }
  .evtitle { font-size: 17px; font-weight: 600; margin-bottom: 8px; color: #f5efdd; }
  .evdesc { font-size: 15.5px; line-height: 1.8; color: var(--muted); }
  .brentcard { text-align: center; display: flex; flex-direction: column; justify-content: center; }
  .brentlbl { font-size: 12px; color: var(--muted); letter-spacing: 1px; }
  .brentval { font-size: 28px; font-weight: 700; color: var(--brent); font-variant-numeric: tabular-nums; margin: 2px 0; }
  .brentchg { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .spark { margin-top: 8px; }
  .timeline-dots {
    display: flex; gap: 5px; margin-top: 14px; justify-content: center; flex-wrap: wrap;
  }
  .tdot {
    width: 30px; height: 6px; border-radius: 3px;
    background: var(--line); cursor: pointer; transition: background .2s;
    border: none; min-width: 30px; padding: 0;
  }
  .tdot.done { background: #4a5a68; }
  .tdot.now { background: var(--iran); }
  footer { margin-top: 20px; font-size: 12.5px; color: #8fa0ae; line-height: 1.7; }
  @media (prefers-reduced-motion: no-preference) {
    @keyframes pulse {
      0% { transform: scale(0.3); opacity: 0.9; }
      100% { transform: scale(3); opacity: 0; }
    }
    .pulse {
      animation: pulse 1.5s ease-out infinite;
      transform-origin: center; transform-box: fill-box;
    }
  }
  .fade { transition: opacity .4s; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Conflict tracker · 2026.7.6 – 7.23</div>
    <h1>美伊衝突升級時間軸 <span>停火破裂後的18天</span></h1>
  </header>

  <div class="mapbox">
    <svg viewBox="0 0 860 560" role="img" aria-label="波灣與紅海衝突示意地圖">
      <rect x="0" y="0" width="860" height="560" fill="var(--sea)"/>
      <!-- 伊朗 -->
      <path d="M370 0 L860 0 L860 300 L800 322 L740 315 L706 288 L640 255 L545 225 L468 195 L420 150 L392 78 Z"
            fill="var(--land)" stroke="var(--land-line)" stroke-width="1"/>
      <!-- 伊拉克 -->
      <path d="M120 0 L370 0 L392 78 L360 130 L322 158 L268 148 L200 128 L158 92 L138 40 Z"
            fill="#202b36" stroke="var(--land-line)" stroke-width="1"/>
      <!-- 約旦 / 以色列方向 -->
      <path d="M0 0 L120 0 L138 40 L120 110 L70 148 L0 140 Z"
            fill="#222d38" stroke="var(--land-line)" stroke-width="1"/>
      <!-- 沙烏地 -->
      <path d="M0 160 L66 162 L128 190 L180 235 L210 300 L360 348 L460 388 L530 415 L516 470 L400 512 L280 528 L180 500 L138 452 L128 360 L92 262 L38 205 Z"
            fill="var(--land)" stroke="var(--land-line)" stroke-width="1"/>
      <!-- 科威特 -->
      <path d="M328 152 L372 164 L366 198 L326 186 Z" fill="#2a3844" stroke="var(--land-line)" stroke-width="1"/>
      <!-- 巴林 -->
      <ellipse cx="482" cy="292" rx="12" ry="16" fill="#2a3844" stroke="var(--land-line)" stroke-width="1"/>
      <!-- 卡達 -->
      <path d="M528 300 L550 292 L560 326 L536 332 Z" fill="#2a3844" stroke="var(--land-line)" stroke-width="1"/>
      <!-- 阿聯 / 阿曼 -->
      <path d="M530 415 L560 355 L640 325 L706 305 L726 332 L706 382 L630 412 L562 452 Z"
            fill="#26323e" stroke="var(--land-line)" stroke-width="1"/>
      <!-- 葉門 -->
      <path d="M180 500 L280 528 L276 558 L140 552 L112 505 Z" fill="#222d38" stroke="var(--land-line)" stroke-width="1"/>
      <!-- 紅海 -->
      <path d="M38 205 L92 262 L128 360 L138 452 L112 505 L70 528 L34 452 L22 310 Z" fill="var(--sea)" stroke="none"/>

      <!-- 地名 -->
      <text x="620" y="105" fill="#dde6ec" font-size="19" font-weight="600">伊朗</text>
      <text x="255" y="80" fill="#b0bfca" font-size="15">伊拉克</text>
      <text x="38" y="70" fill="#b0bfca" font-size="15">約旦</text>
      <text x="280" y="400" fill="#dde6ec" font-size="18" font-weight="600">沙烏地阿拉伯</text>
      <text x="310" y="140" fill="#b0bfca" font-size="14">科威特</text>
      <text x="436" y="278" fill="#b0bfca" font-size="14">巴林</text>
      <text x="566" y="298" fill="#b0bfca" font-size="14">卡達</text>
      <text x="600" y="398" fill="#b0bfca" font-size="15">阿曼</text>
      <text x="150" y="540" fill="#b0bfca" font-size="15">葉門</text>
      <text x="498" y="258" fill="#a5d6f2" font-size="15" font-weight="500">波斯灣</text>
      <text x="40" y="330" fill="#a5d6f2" font-size="15" font-weight="500">紅海</text>

      <!-- 兩大咽喉點 -->
      <circle cx="712" cy="298" r="6" fill="none" stroke="#a8dcf8" stroke-width="2"/>
      <text x="726" y="285" fill="#c8ecff" font-size="15" font-weight="600">荷莫茲海峽</text>
      <circle cx="100" cy="512" r="6" fill="none" stroke="#a8dcf8" stroke-width="2"/>
      <text x="88" y="500" fill="#c8ecff" font-size="15" font-weight="600" text-anchor="end">曼德海峽</text>

      <g id="past"></g>
      <g id="active"></g>
    </svg>
    <div class="legend">
      <span><b style="background:var(--us)"></b>美軍打擊</span>
      <span><b style="background:var(--iran)"></b>伊朗／代理人攻擊</span>
      <span><b style="background:var(--naval)"></b>航運與封鎖事件</span>
      <span style="margin-left:auto">淡色小點＝已發生事件</span>
    </div>
  </div>

  <div class="controls">
    <button id="play" aria-label="播放">▶ 播放</button>
    <button id="prev" aria-label="上一個">←</button>
    <button id="next" aria-label="下一個">→</button>
    <input type="range" id="scrub" min="0" max="9" step="1" value="0" aria-label="時間軸">
    <span class="datelbl" id="datelbl">7/6</span>
  </div>

  <div class="info">
    <div class="card">
      <div class="evtitle" id="evtitle"></div>
      <div class="evdesc" id="evdesc"></div>
    </div>
    <div class="card brentcard">
      <div class="brentlbl">布蘭特原油</div>
      <div class="brentval" id="brent">$71</div>
      <div class="brentchg" id="brentchg">戰前水位</div>
      <svg class="spark" viewBox="0 0 120 34" width="120" height="34" aria-hidden="true">
        <polyline id="sparkline" fill="none" stroke="var(--brent)" stroke-width="2" points=""/>
        <circle id="sparkdot" r="3" fill="var(--brent)"/>
      </svg>
    </div>
  </div>

  <div class="timeline-dots" id="dots"></div>

  <footer>
    資料來源：CNN、CBS、Al Jazeera、Reuters／Kpler、Lloyd's List、TradingEconomics。<br>
    最後更新：2026.7.24（事件涵蓋至7.23）<br>
    地圖為示意性質，非精確地理位置。油價為各日約略收盤／盤中水位。
  </footer>
</div>

<script>
const EV = [
  {d:"7/6", t:"伊朗攻擊三艘商船，測試停火底線", desc:"伊朗在荷莫茲海峽附近對包括三艘商船在內的船隻開火，強推「船隻須走伊朗指定航線並繳費」的規則；一艘沙烏地油輪在阿曼Limah外海遭不明彈體擊中起火。6月17日簽署的停火備忘錄名存實亡。", brent:71,
   m:[{x:712,y:298,c:"var(--iran)"},{x:748,y:330,c:"var(--iran)"}]},
  {d:"7/8", t:"停火正式破裂，美軍重啟空襲", desc:"川普宣布他認為停火已經結束，美軍恢復對伊朗的空襲，打擊海岸監視、防空與飛彈設施。布蘭特單日上漲逾3%。", brent:76,
   m:[{x:600,y:180,c:"var(--us)"},{x:690,y:250,c:"var(--us)"}]},
  {d:"7/12", t:"伊朗宣布荷莫茲海峽關閉", desc:"革命衛隊宣布海峽關閉。當日僅10艘船通行（正常約88艘／日），通行量崩跌至接近歸零；越來越多船隻關閉AIS訊號摸黑航行。", brent:80,
   m:[{x:712,y:298,c:"var(--naval)"}]},
  {d:"7/13", t:"美國恢復對伊朗港口海上封鎖", desc:"川普堅稱海峽「仍然開放」，但重新對進出伊朗港口的船隻實施海上封鎖；伊朗攻擊兩艘油輪後，布蘭特單日大漲9.6%至83.3美元。", brent:83,
   m:[{x:756,y:290,c:"var(--naval)"},{x:700,y:315,c:"var(--iran)"}]},
  {d:"7/17", t:"約旦美軍基地遭襲，2名美軍陣亡", desc:"革命衛隊襲擊約旦境內美軍基地，造成2名美軍陣亡、1人失蹤——這是3月以來首次由伊朗火力造成的美軍死亡；巴林美軍無人艇基地與科威特基地同步遭攻擊。", brent:85,
   m:[{x:75,y:95,c:"var(--iran)"},{x:348,y:175,c:"var(--iran)"},{x:482,y:292,c:"var(--iran)"}]},
  {d:"7/18", t:"美軍第8晚空襲；科威特淡化廠起火", desc:"美軍報復性打擊革命衛隊與伊朗海岸設施、飛彈與無人機儲存點；科威特一座海水淡化暨發電設施遭襲起火；革命衛隊聲稱以飛彈與無人機攔停4艘船隻。", brent:87,
   m:[{x:640,y:140,c:"var(--us)"},{x:350,y:172,c:"var(--iran)"},{x:712,y:298,c:"var(--naval)"}]},
  {d:"7/19", t:"革命衛隊禁止海峽所有海上交通", desc:"革命衛隊宣布禁止荷莫茲海峽所有海上交通；美軍展開第9晚空襲；區域內約490艘船隻下錨或停航等待，布蘭特站上90美元。", brent:90,
   m:[{x:712,y:298,c:"var(--naval)"},{x:560,y:200,c:"var(--us)"}]},
  {d:"7/20", t:"油輪再遇襲；美軍向中東增兵", desc:"一艘油輪在阿曼Limah東北8海里處遭彈體擊中；美軍增派戰機至中東，數十架加油機陸續抵達以色列——為更大規模行動做準備的訊號。", brent:91,
   m:[{x:750,y:335,c:"var(--iran)"},{x:540,y:120,c:"var(--us)"}]},
  {d:"7/22", t:"川普：一艘船換一座橋或電廠", desc:"美軍連續第11–12晚空襲；川普揚言伊朗每攻擊一艘海峽船隻，美方就摧毀一座伊朗橋樑或發電廠；伊朗回應將打擊區域內基礎設施與能源設施。美軍陣亡累計18人，戰爭成本達375億美元。", brent:94,
   m:[{x:660,y:100,c:"var(--us)"},{x:590,y:230,c:"var(--us)"}]},
  {d:"7/23", t:"Houthi封鎖紅海，擊中兩艘沙國油輪", desc:"葉門青年運動宣布對沙烏地船隻實施海上封鎖，並聲稱在紅海擊中兩艘沙國油輪；革命衛隊稱一艘油輪在海峽爆炸起火。衝突正式外溢至第二條航道——荷莫茲與曼德海峽同時受阻。", brent:95,
   m:[{x:100,y:512,c:"var(--iran)"},{x:80,y:420,c:"var(--iran)"},{x:712,y:298,c:"var(--naval)"}]}
];

const NS = "http://www.w3.org/2000/svg";
const past = document.getElementById('past');
const act = document.getElementById('active');
const dotsEl = document.getElementById('dots');
let idx = 0, timer = null;

EV.forEach((e,i)=>{
  const b = document.createElement('button');
  b.className = 'tdot';
  b.setAttribute('aria-label', e.d + ' ' + e.t);
  b.onclick = ()=>{ stop(); idx=i; render(); };
  dotsEl.appendChild(b);
});

function mkCircle(x,y,r,fill,cls,op){
  const c = document.createElementNS(NS,'circle');
  c.setAttribute('cx',x); c.setAttribute('cy',y); c.setAttribute('r',r);
  c.setAttribute('fill',fill);
  if(cls) c.setAttribute('class',cls);
  if(op) c.setAttribute('opacity',op);
  return c;
}

function sparkline(){
  const min=68, max=98, w=120, h=34, pad=3;
  const pts = EV.slice(0, idx+1).map((e,i)=>{
    const x = pad + (w-2*pad) * (i/(EV.length-1));
    const y = h - pad - (h-2*pad) * ((e.brent-min)/(max-min));
    return [x,y];
  });
  document.getElementById('sparkline').setAttribute('points', pts.map(p=>p.join(',')).join(' '));
  const last = pts[pts.length-1];
  const dot = document.getElementById('sparkdot');
  dot.setAttribute('cx', last[0]); dot.setAttribute('cy', last[1]);
}

function render(){
  const e = EV[idx];
  past.innerHTML=''; act.innerHTML='';
  for(let i=0;i<idx;i++){
    EV[i].m.forEach(m=> past.appendChild(mkCircle(m.x,m.y,4,m.c,'fade','0.4')));
  }
  e.m.forEach(m=>{
    act.appendChild(mkCircle(m.x,m.y,9,m.c,'pulse','0.65'));
    act.appendChild(mkCircle(m.x,m.y,6.5,m.c));
  });
  document.getElementById('datelbl').textContent = e.d;
  document.getElementById('evtitle').textContent = e.d + '　' + e.t;
  document.getElementById('evdesc').textContent = e.desc;
  document.getElementById('brent').textContent = '$' + e.brent;
  const chg = idx>0 ? e.brent - EV[idx-1].brent : 0;
  document.getElementById('brentchg').textContent =
    idx>0 ? ((chg>=0?'+':'')+chg+' vs 前一事件') : '接近戰前水位';
  document.getElementById('scrub').value = idx;
  [...dotsEl.children].forEach((d,i)=>{
    d.className = 'tdot' + (i<idx?' done': i===idx?' now':'');
  });
  sparkline();
}

function step(){
  if(idx < EV.length-1){ idx++; render(); }
  else stop();
}
function play(){
  timer = setInterval(step, 3200);
  document.getElementById('play').textContent = '⏸ 暫停';
}
function stop(){
  clearInterval(timer); timer = null;
  document.getElementById('play').textContent = '▶ 播放';
}
document.getElementById('play').onclick = ()=>{
  if(timer) stop();
  else { if(idx >= EV.length-1){ idx=0; render(); } play(); }
};
document.getElementById('next').onclick = ()=>{ stop(); if(idx<EV.length-1){idx++; render();} };
document.getElementById('prev').onclick = ()=>{ stop(); if(idx>0){idx--; render();} };
document.getElementById('scrub').oninput = ev=>{ stop(); idx = +ev.target.value; render(); };
render();
</script>
</body>
</html>
